services:
  mdcng-adapter:
    image: ghcr.io/chasesgp/mdcng-adapter:latest
    build: .
    container_name: mdcng-adapter
    environment:
      TZ: Asia/Singapore
      SUB2API_BASE_URL: http://sub2api:8080
      GROK_MODEL_PREFIXES: grok
      FORCE_STREAM_FALSE: "true"
      CLEAN_GROK_RESPONSE: "true"
      PASSTHROUGH_NON_GROK: "true"
      LOG_LEVEL: info
      REQUEST_TIMEOUT: "120"
      DEBUG_LOG_PROMPT: "false"
      DEBUG_LOG_PROMPT_MAX_CHARS: "1000"
      DEBUG_LOG_REQUEST_BODY: "false"
      DEBUG_LOG_REQUEST_BODY_MAX_CHARS: "4000"
      DEBUG_LOG_RESPONSE_BODY: "false"
      DEBUG_LOG_RESPONSE_BODY_MAX_CHARS: "4000"
    ports:
      - "8080:8080"
    networks:
      - mdcng-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "7"

networks:
  mdcng-network:
    external: true
